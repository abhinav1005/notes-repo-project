name: Process Notes

on:
  push:
    branches: [main]
    paths:
      - "notes/*.md" # only markdown files in /notes/, no subfolders

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ensures diffs work reliably

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Get changed markdown files
        id: changed-files
        run: |
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'notes/*.md' | tr '\n' ' ' > files.txt
          echo "files=$(cat files.txt)" >> $GITHUB_OUTPUT
          echo "Changed files: $(cat files.txt)"

      - name: Process notes
        if: steps.changed-files.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
        run: python backend/process_notes.py

      - name: Commit processed entries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge-hub/src/Data/entries.json
          git diff --staged --quiet || git commit -m "chore: process notes [skip ci]"
          git push
